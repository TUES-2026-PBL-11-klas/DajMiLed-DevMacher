# Disable .env import — all test values are defined here
spring.config.import=

# In-memory H2 (PostgreSQL compatibility mode)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

# Security — use a fixed predictable secret in tests
JWT_SECRET=test-secret-key-that-is-long-enough-for-hmac-sha256-algorithm
JWT_EXPIRATION_MS=3600000

# Disable rate limiting so tests don't trip over the 10 req/min auth limit
app.rate-limit.enabled=false

# Suppress noisy startup logs
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
